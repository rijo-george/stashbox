name: StashBox
options:
  bundleIdPrefix: com.stashbox
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
    INFOPLIST_FILE: StashBox/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    PRODUCT_BUNDLE_IDENTIFIER: com.rijo.stashbox
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "3"
    DEVELOPMENT_TEAM: "K8383Q54VB"
    CODE_SIGN_STYLE: Automatic

targets:
  StashBox:
    type: application
    platform: iOS
    sources:
      - path: StashBox
    settings:
      base:
        PRODUCT_NAME: "StashBox"
        INFOPLIST_FILE: StashBox/Info.plist
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: true
    entitlements:
      path: StashBox/StashBox.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rijo.stashbox
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.rijo.stashbox
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.rijo.stashbox
